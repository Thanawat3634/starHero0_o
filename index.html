<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>starHero0_o AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Mingpu - AR zero to hero" />
 
  <!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
 
  <!-- CSS -->
<link rel="stylesheet" href="style.css" />
</head>
 
<body>
 
<header>
<div class="main-title">eendhero</div>
<div class="sub-title">AR Experience</div>
</header>
 
<!-- AR Section -->
<section class="ar-section">
<div class="head-title">Mingpu</div>
<div class="sub-title">Concept design from Thai grilled pork (หมูปิ้ง)</div>
 
  <model-viewer

    id="model1"

    src="AR.glb"

    ios-src="AR.usdz"

    ar

    ar-modes="scene-viewer webxr quick-look"

    ar-placement="floor"

    camera-controls

    auto-rotate

    autoplay

    shadow-intensity="1"

    shadow-softness="1"

    environment-image="neutral"

    loading="eager"

    reveal="auto"

    style="width: 100%; height: 400px;"
>
</model-viewer>
 
  <button class="ar-button" onclick="triggerAR('model1')">

    Play AR
</button>
</section>

 <header>
<div class="main-title">eendhero</div>
<div class="sub-title">AR Experience</div>
</header>
 
<!-- AR Section -->
<section class="ar-section">

<div class="sub-title">Concept design satw</div>
 
  <model-viewer

<!-- Load model-viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
 
<!-- AR Button Script -->
<script>

  function triggerAR(id) {

    const viewer = document.getElementById(id);
 
    if (!viewer) {

      console.warn("Model viewer not found");

      return;

    }
 
    if (viewer.activateAR) {

      viewer.activateAR().catch((error) => {

        alert("AR ไม่รองรับบนอุปกรณ์นี้ หรือถูกบล็อกโดยเบราว์เซอร์\nกรุณากดปุ่ม AR บนตัวโมเดลแทน");

        console.warn("activateAR failed:", error);

      });

    } else {

      alert("เบราว์เซอร์นี้ไม่รองรับ AR");

    }

  }
</script>
 
</body>
</html>
